        - [63.5, 25.0]
        - [63.5, 39.8]
        - [44.0, 39.8]
        - [44.0, 25.0]
      duration_hours: 48
      notam_id: "A0001/24"
      reroute_penalty_minutes: 150
      affected_route_pairs:
        - [KJFK, OMDB]
        - [KLAX, OMDB]
        - [KATL, OMDB]
        - [KORD, OMDB]
        - [KORD, RJAA]
        - [KLAX, RJAA]
      overfly_alternatives:
        - route: "via Saudi Arabia (OEJD FIR)"
