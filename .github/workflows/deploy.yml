name: Deploy

# Continuous deployment for the Railway (API) + Vercel (web) stack.
#
# This pipeline pushes the backend to Railway and the frontend to Vercel after
# CI passes on main. If you instead rely on Railway's and Vercel's *native* Git
# integrations (auto-deploy on push), disable those for this repo to avoid
# double-deploying — or just delete the corresponding job below.
#
# Required repository secrets:
#   RAILWAY_TOKEN     — Railway project/account token (Project Settings → Tokens)
#   VERCEL_TOKEN      — Vercel account token
#   VERCEL_ORG_ID     — Vercel org/team id
#   VERCEL_PROJECT_ID — Vercel project id (the apps/web project)
#   API_URL           — Public Railway API URL, e.g. https://aeolus-api.up.railway.app
# Required repository variable (optional, defaults to "aeolus-api"):
#   RAILWAY_SERVICE   — the Railway service name to deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel an in-flight deployment

jobs:
  # ── Deploy API to Railway ─────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      # railway.json (repo root) pins builder=DOCKERFILE + dockerfilePath, so
      # `railway up` builds the API image with the repo root as context — the
      # same context docker-compose and CI use.
      - name: Deploy to Railway
        run: railway up --service "${{ vars.RAILWAY_SERVICE || 'aeolus-api' }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy Frontend to Vercel ─────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: "--prod"

  # ── Smoke Test ────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]

    steps:
      - name: Health check API
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 10 attempts"
          exit 1

      - name: Check network endpoint
        run: |
          curl -f "${{ secrets.API_URL }}/api/v1/network" \
            -H "Accept: application/json" | jq '.airports | length'
