                - text: Deterministic.
                - emphasis [ref=f48e464]: Auditable.
                - text: Open.
            - paragraph [ref=f48e466]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f48e467]:
            - generic [ref=f48e469]:
              - generic [ref=f48e470]: "01"
              - generic [ref=f48e471]: Cascade model
              - generic [ref=f48e472]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f48e473]: deterministic
            - generic [ref=f48e475]:
              - generic [ref=f48e476]: "02"
              - generic [ref=f48e477]: Recovery optimizer
              - generic [ref=f48e478]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f48e479]: < 10 ms
            - generic [ref=f48e481]:
              - generic [ref=f48e482]: "03"
              - generic [ref=f48e483]: Cost engine
              - generic [ref=f48e484]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f48e485]: BTS 2023
            - generic [ref=f48e487]:
              - generic [ref=f48e488]: "04"
              - generic [ref=f48e489]: Crew legality
              - generic [ref=f48e490]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f48e491]: Part 117
            - generic [ref=f48e493]:
              - generic [ref=f48e494]: "05"
              - generic [ref=f48e495]: Live context
              - generic [ref=f48e496]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
