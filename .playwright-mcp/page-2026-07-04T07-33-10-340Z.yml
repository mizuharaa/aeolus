            - generic [ref=f12e299]: 03 — Methodology
            - heading "Deterministic.Auditable. Open." [level=2] [ref=f12e449]:
              - generic [ref=f12e451]: Deterministic.
              - generic [ref=f12e453]:
                - emphasis [ref=f12e301]: Auditable.
                - text: Open.
          - paragraph [ref=f12e303]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f12e304]:
          - generic [ref=f12e306]:
            - generic [ref=f12e307]: "01"
            - generic [ref=f12e308]: Cascade model
            - generic [ref=f12e309]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f12e310]: deterministic
          - generic [ref=f12e312]:
            - generic [ref=f12e313]: "02"
            - generic [ref=f12e314]: Recovery optimizer
            - generic [ref=f12e315]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f12e316]: < 10 ms
          - generic [ref=f12e318]:
            - generic [ref=f12e319]: "03"
            - generic [ref=f12e320]: Cost engine
            - generic [ref=f12e321]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f12e322]: BTS 2023
          - generic [ref=f12e324]:
            - generic [ref=f12e325]: "04"
            - generic [ref=f12e326]: Crew legality
            - generic [ref=f12e327]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f12e328]: Part 117
          - generic [ref=f12e330]:
            - generic [ref=f12e331]: "05"
            - generic [ref=f12e332]: Live context
            - generic [ref=f12e333]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f12e334]: FAA · NWS
          - generic [ref=f12e336]:
            - generic [ref=f12e337]: "06"
            - generic [ref=f12e338]: Audit trail
            - generic [ref=f12e339]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f12e340]: replayable
