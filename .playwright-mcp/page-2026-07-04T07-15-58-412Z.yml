      - generic [ref=f3e332]:
        - generic [ref=f3e333]:
          - generic [ref=f3e334]:
            - generic [ref=f3e335]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f3e336]:
              - text: Deterministic.
              - emphasis [ref=f3e337]: Auditable.
              - text: Open.
          - paragraph [ref=f3e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f3e340]:
          - generic [ref=f3e342]:
            - generic [ref=f3e343]: "01"
            - generic [ref=f3e344]: Cascade model
            - generic [ref=f3e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f3e346]: deterministic
          - generic [ref=f3e348]:
            - generic [ref=f3e349]: "02"
            - generic [ref=f3e350]: Recovery optimizer
            - generic [ref=f3e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f3e352]: < 10 ms
          - generic [ref=f3e354]:
            - generic [ref=f3e355]: "03"
            - generic [ref=f3e356]: Cost engine
            - generic [ref=f3e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f3e358]: BTS 2023
          - generic [ref=f3e360]:
            - generic [ref=f3e361]: "04"
            - generic [ref=f3e362]: Crew legality
            - generic [ref=f3e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f3e364]: Part 117
          - generic [ref=f3e366]:
            - generic [ref=f3e367]: "05"
            - generic [ref=f3e368]: Live context
            - generic [ref=f3e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f3e370]: FAA · NWS
          - generic [ref=f3e372]:
            - generic [ref=f3e373]: "06"
            - generic [ref=f3e374]: Audit trail
            - generic [ref=f3e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f3e376]: replayable
