      - region "Methodology" [ref=f41e387]:
        - generic [ref=f41e388]:
          - generic [ref=f41e389]:
            - generic [ref=f41e390]:
              - generic [ref=f41e391]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f41e392]:
                - text: Deterministic.
                - emphasis [ref=f41e393]: Auditable.
                - text: Open.
            - paragraph [ref=f41e395]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f41e396]:
            - generic [ref=f41e398]:
              - generic [ref=f41e399]: "01"
              - generic [ref=f41e400]: Cascade model
              - generic [ref=f41e401]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f41e402]: deterministic
            - generic [ref=f41e404]:
              - generic [ref=f41e405]: "02"
              - generic [ref=f41e406]: Recovery optimizer
              - generic [ref=f41e407]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f41e408]: < 10 ms
            - generic [ref=f41e410]:
              - generic [ref=f41e411]: "03"
              - generic [ref=f41e412]: Cost engine
              - generic [ref=f41e413]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f41e414]: BTS 2023
            - generic [ref=f41e416]:
              - generic [ref=f41e417]: "04"
              - generic [ref=f41e418]: Crew legality
              - generic [ref=f41e419]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f41e420]: Part 117
            - generic [ref=f41e422]:
              - generic [ref=f41e423]: "05"
              - generic [ref=f41e424]: Live context
              - generic [ref=f41e425]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f41e426]: FAA · NWS
            - generic [ref=f41e428]:
              - generic [ref=f41e429]: "06"
              - generic [ref=f41e430]: Audit trail
              - generic [ref=f41e431]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f41e432]: replayable
