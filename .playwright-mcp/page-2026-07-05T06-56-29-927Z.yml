                - text: Deterministic.
                - emphasis [ref=f56e476]: Auditable.
                - text: Open.
            - paragraph [ref=f56e478]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f56e479]:
            - generic [ref=f56e481]:
              - generic [ref=f56e482]: "01"
              - generic [ref=f56e483]: Cascade model
              - generic [ref=f56e484]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f56e485]: deterministic
            - generic [ref=f56e487]:
              - generic [ref=f56e488]: "02"
              - generic [ref=f56e489]: Recovery optimizer
              - generic [ref=f56e490]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f56e491]: < 10 ms
            - generic [ref=f56e493]:
              - generic [ref=f56e494]: "03"
              - generic [ref=f56e495]: Cost engine
              - generic [ref=f56e496]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f56e497]: BTS 2023
            - generic [ref=f56e499]:
              - generic [ref=f56e500]: "04"
              - generic [ref=f56e501]: Crew legality
              - generic [ref=f56e502]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f56e503]: Part 117
            - generic [ref=f56e505]:
              - generic [ref=f56e506]: "05"
              - generic [ref=f56e507]: Live context
              - generic [ref=f56e508]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
