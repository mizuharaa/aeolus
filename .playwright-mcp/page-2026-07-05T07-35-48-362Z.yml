                - text: Deterministic.
                - emphasis [ref=f70e476]: Auditable.
                - text: Open.
            - paragraph [ref=f70e478]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f70e479]:
            - generic [ref=f70e481]:
              - generic [ref=f70e482]: "01"
              - generic [ref=f70e483]: Cascade model
              - generic [ref=f70e484]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f70e485]: deterministic
            - generic [ref=f70e487]:
              - generic [ref=f70e488]: "02"
              - generic [ref=f70e489]: Recovery optimizer
              - generic [ref=f70e490]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f70e491]: < 10 ms
            - generic [ref=f70e493]:
              - generic [ref=f70e494]: "03"
              - generic [ref=f70e495]: Cost engine
              - generic [ref=f70e496]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f70e497]: BTS 2023
            - generic [ref=f70e499]:
              - generic [ref=f70e500]: "04"
              - generic [ref=f70e501]: Crew legality
              - generic [ref=f70e502]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f70e503]: Part 117
            - generic [ref=f70e505]:
              - generic [ref=f70e506]: "05"
              - generic [ref=f70e507]: Live context
