          - generic [ref=f13e298]:
            - generic [ref=f13e299]: 03 — Methodology
            - heading "Deterministic.Auditable. Open." [level=2] [ref=f13e447]:
              - generic [ref=f13e449]: Deterministic.
              - generic [ref=f13e451]:
                - emphasis [ref=f13e301]: Auditable.
                - text: Open.
          - paragraph [ref=f13e303]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f13e304]:
          - generic [ref=f13e306]:
            - generic [ref=f13e307]: "01"
            - generic [ref=f13e308]: Cascade model
            - generic [ref=f13e309]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f13e310]: deterministic
          - generic [ref=f13e312]:
            - generic [ref=f13e313]: "02"
            - generic [ref=f13e314]: Recovery optimizer
            - generic [ref=f13e315]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f13e316]: < 10 ms
          - generic [ref=f13e318]:
            - generic [ref=f13e319]: "03"
            - generic [ref=f13e320]: Cost engine
            - generic [ref=f13e321]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f13e322]: BTS 2023
          - generic [ref=f13e324]:
            - generic [ref=f13e325]: "04"
            - generic [ref=f13e326]: Crew legality
            - generic [ref=f13e327]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f13e328]: Part 117
          - generic [ref=f13e330]:
            - generic [ref=f13e331]: "05"
            - generic [ref=f13e332]: Live context
            - generic [ref=f13e333]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f13e334]: FAA · NWS
          - generic [ref=f13e336]:
            - generic [ref=f13e337]: "06"
            - generic [ref=f13e338]: Audit trail
            - generic [ref=f13e339]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f13e340]: replayable
