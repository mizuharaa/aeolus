        - generic [ref=f35e423]:
          - generic [ref=f35e424]:
            - generic [ref=f35e425]:
              - generic [ref=f35e426]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f35e427]:
                - text: Deterministic.
                - emphasis [ref=f35e428]: Auditable.
                - text: Open.
            - paragraph [ref=f35e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f35e431]:
            - generic [ref=f35e433]:
              - generic [ref=f35e434]: "01"
              - generic [ref=f35e435]: Cascade model
              - generic [ref=f35e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f35e437]: deterministic
            - generic [ref=f35e439]:
              - generic [ref=f35e440]: "02"
              - generic [ref=f35e441]: Recovery optimizer
              - generic [ref=f35e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f35e443]: < 10 ms
            - generic [ref=f35e445]:
              - generic [ref=f35e446]: "03"
              - generic [ref=f35e447]: Cost engine
              - generic [ref=f35e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f35e449]: BTS 2023
            - generic [ref=f35e451]:
              - generic [ref=f35e452]: "04"
              - generic [ref=f35e453]: Crew legality
              - generic [ref=f35e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f35e455]: Part 117
            - generic [ref=f35e457]:
              - generic [ref=f35e458]: "05"
              - generic [ref=f35e459]: Live context
              - generic [ref=f35e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f35e461]: FAA · NWS
            - generic [ref=f35e463]:
              - generic [ref=f35e464]: "06"
              - generic [ref=f35e465]: Audit trail
              - generic [ref=f35e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f35e467]: replayable
