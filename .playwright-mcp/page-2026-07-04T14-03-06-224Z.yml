        - generic [ref=f21e417]:
          - generic [ref=f21e418]:
            - generic [ref=f21e419]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f21e420]:
              - text: Deterministic.
              - emphasis [ref=f21e421]: Auditable.
              - text: Open.
          - paragraph [ref=f21e423]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f21e424]:
          - generic [ref=f21e426]:
            - generic [ref=f21e427]: "01"
            - generic [ref=f21e428]: Cascade model
            - generic [ref=f21e429]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f21e430]: deterministic
          - generic [ref=f21e432]:
            - generic [ref=f21e433]: "02"
            - generic [ref=f21e434]: Recovery optimizer
            - generic [ref=f21e435]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f21e436]: < 10 ms
          - generic [ref=f21e438]:
            - generic [ref=f21e439]: "03"
            - generic [ref=f21e440]: Cost engine
            - generic [ref=f21e441]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f21e442]: BTS 2023
          - generic [ref=f21e444]:
            - generic [ref=f21e445]: "04"
            - generic [ref=f21e446]: Crew legality
            - generic [ref=f21e447]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f21e448]: Part 117
          - generic [ref=f21e450]:
            - generic [ref=f21e451]: "05"
            - generic [ref=f21e452]: Live context
            - generic [ref=f21e453]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f21e454]: FAA · NWS
          - generic [ref=f21e456]:
            - generic [ref=f21e457]: "06"
            - generic [ref=f21e458]: Audit trail
            - generic [ref=f21e459]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f21e460]: replayable
