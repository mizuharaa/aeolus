          - generic [ref=f14e325]:
            - generic [ref=f14e326]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f14e327]:
              - text: Deterministic.
              - emphasis [ref=f14e328]: Auditable.
              - text: Open.
          - paragraph [ref=f14e330]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f14e331]:
          - generic [ref=f14e333]:
            - generic [ref=f14e334]: "01"
            - generic [ref=f14e335]: Cascade model
            - generic [ref=f14e336]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f14e337]: deterministic
          - generic [ref=f14e339]:
            - generic [ref=f14e340]: "02"
            - generic [ref=f14e341]: Recovery optimizer
            - generic [ref=f14e342]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f14e343]: < 10 ms
          - generic [ref=f14e345]:
            - generic [ref=f14e346]: "03"
            - generic [ref=f14e347]: Cost engine
            - generic [ref=f14e348]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f14e349]: BTS 2023
          - generic [ref=f14e351]:
            - generic [ref=f14e352]: "04"
            - generic [ref=f14e353]: Crew legality
            - generic [ref=f14e354]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f14e355]: Part 117
          - generic [ref=f14e357]:
            - generic [ref=f14e358]: "05"
            - generic [ref=f14e359]: Live context
            - generic [ref=f14e360]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f14e361]: FAA · NWS
          - generic [ref=f14e363]:
            - generic [ref=f14e364]: "06"
            - generic [ref=f14e365]: Audit trail
            - generic [ref=f14e366]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f14e367]: replayable
