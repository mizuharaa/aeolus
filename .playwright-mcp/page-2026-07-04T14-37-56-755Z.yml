      - region "Methodology" [ref=f38e387]:
        - generic [ref=f38e388]:
          - generic [ref=f38e389]:
            - generic [ref=f38e390]:
              - generic [ref=f38e391]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f38e392]:
                - text: Deterministic.
                - emphasis [ref=f38e393]: Auditable.
                - text: Open.
            - paragraph [ref=f38e395]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f38e396]:
            - generic [ref=f38e398]:
              - generic [ref=f38e399]: "01"
              - generic [ref=f38e400]: Cascade model
              - generic [ref=f38e401]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f38e402]: deterministic
            - generic [ref=f38e404]:
              - generic [ref=f38e405]: "02"
              - generic [ref=f38e406]: Recovery optimizer
              - generic [ref=f38e407]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f38e408]: < 10 ms
            - generic [ref=f38e410]:
              - generic [ref=f38e411]: "03"
              - generic [ref=f38e412]: Cost engine
              - generic [ref=f38e413]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f38e414]: BTS 2023
            - generic [ref=f38e416]:
              - generic [ref=f38e417]: "04"
              - generic [ref=f38e418]: Crew legality
              - generic [ref=f38e419]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f38e420]: Part 117
            - generic [ref=f38e422]:
              - generic [ref=f38e423]: "05"
              - generic [ref=f38e424]: Live context
              - generic [ref=f38e425]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f38e426]: FAA · NWS
            - generic [ref=f38e428]:
              - generic [ref=f38e429]: "06"
              - generic [ref=f38e430]: Audit trail
              - generic [ref=f38e431]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f38e432]: replayable
