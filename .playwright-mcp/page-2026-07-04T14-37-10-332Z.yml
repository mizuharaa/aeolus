              - heading "Deterministic.Auditable. Open." [level=2] [ref=f37e595]:
                - generic [ref=f37e597]: Deterministic.
                - generic [ref=f37e599]:
                  - emphasis [ref=f37e428]: Auditable.
                  - text: Open.
            - paragraph [ref=f37e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f37e431]:
            - generic [ref=f37e433]:
              - generic [ref=f37e434]: "01"
              - generic [ref=f37e435]: Cascade model
              - generic [ref=f37e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f37e437]: deterministic
            - generic [ref=f37e439]:
              - generic [ref=f37e440]: "02"
              - generic [ref=f37e441]: Recovery optimizer
              - generic [ref=f37e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f37e443]: < 10 ms
            - generic [ref=f37e445]:
              - generic [ref=f37e446]: "03"
              - generic [ref=f37e447]: Cost engine
              - generic [ref=f37e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f37e449]: BTS 2023
            - generic [ref=f37e451]:
              - generic [ref=f37e452]: "04"
              - generic [ref=f37e453]: Crew legality
              - generic [ref=f37e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f37e455]: Part 117
            - generic [ref=f37e457]:
              - generic [ref=f37e458]: "05"
              - generic [ref=f37e459]: Live context
              - generic [ref=f37e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f37e461]: FAA · NWS
            - generic [ref=f37e463]:
              - generic [ref=f37e464]: "06"
              - generic [ref=f37e465]: Audit trail
              - generic [ref=f37e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f37e467]: replayable
