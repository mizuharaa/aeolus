        - generic [ref=f5e333]:
          - generic [ref=f5e334]:
            - generic [ref=f5e335]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f5e336]:
              - text: Deterministic.
              - emphasis [ref=f5e337]: Auditable.
              - text: Open.
          - paragraph [ref=f5e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f5e340]:
          - generic [ref=f5e342]:
            - generic [ref=f5e343]: "01"
            - generic [ref=f5e344]: Cascade model
            - generic [ref=f5e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f5e346]: deterministic
          - generic [ref=f5e348]:
            - generic [ref=f5e349]: "02"
            - generic [ref=f5e350]: Recovery optimizer
            - generic [ref=f5e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f5e352]: < 10 ms
          - generic [ref=f5e354]:
            - generic [ref=f5e355]: "03"
            - generic [ref=f5e356]: Cost engine
            - generic [ref=f5e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f5e358]: BTS 2023
          - generic [ref=f5e360]:
            - generic [ref=f5e361]: "04"
            - generic [ref=f5e362]: Crew legality
            - generic [ref=f5e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f5e364]: Part 117
          - generic [ref=f5e366]:
            - generic [ref=f5e367]: "05"
            - generic [ref=f5e368]: Live context
            - generic [ref=f5e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f5e370]: FAA · NWS
          - generic [ref=f5e372]:
            - generic [ref=f5e373]: "06"
            - generic [ref=f5e374]: Audit trail
            - generic [ref=f5e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f5e376]: replayable
