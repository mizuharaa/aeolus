        - generic [ref=f46e423]:
          - generic [ref=f46e424]:
            - generic [ref=f46e425]:
              - generic [ref=f46e426]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f46e427]:
                - text: Deterministic.
                - emphasis [ref=f46e428]: Auditable.
                - text: Open.
            - paragraph [ref=f46e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f46e431]:
            - generic [ref=f46e433]:
              - generic [ref=f46e434]: "01"
              - generic [ref=f46e435]: Cascade model
              - generic [ref=f46e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f46e437]: deterministic
            - generic [ref=f46e439]:
              - generic [ref=f46e440]: "02"
              - generic [ref=f46e441]: Recovery optimizer
              - generic [ref=f46e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f46e443]: < 10 ms
            - generic [ref=f46e445]:
              - generic [ref=f46e446]: "03"
              - generic [ref=f46e447]: Cost engine
              - generic [ref=f46e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f46e449]: BTS 2023
            - generic [ref=f46e451]:
              - generic [ref=f46e452]: "04"
              - generic [ref=f46e453]: Crew legality
              - generic [ref=f46e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f46e455]: Part 117
            - generic [ref=f46e457]:
              - generic [ref=f46e458]: "05"
              - generic [ref=f46e459]: Live context
              - generic [ref=f46e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f46e461]: FAA · NWS
            - generic [ref=f46e463]:
              - generic [ref=f46e464]: "06"
              - generic [ref=f46e465]: Audit trail
              - generic [ref=f46e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f46e467]: replayable
