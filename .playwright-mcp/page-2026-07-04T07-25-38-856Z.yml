      - generic [ref=f9e332]:
        - generic [ref=f9e333]:
          - generic [ref=f9e334]:
            - generic [ref=f9e335]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f9e336]:
              - text: Deterministic.
              - emphasis [ref=f9e337]: Auditable.
              - text: Open.
          - paragraph [ref=f9e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f9e340]:
          - generic [ref=f9e342]:
            - generic [ref=f9e343]: "01"
            - generic [ref=f9e344]: Cascade model
            - generic [ref=f9e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f9e346]: deterministic
          - generic [ref=f9e348]:
            - generic [ref=f9e349]: "02"
            - generic [ref=f9e350]: Recovery optimizer
            - generic [ref=f9e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f9e352]: < 10 ms
          - generic [ref=f9e354]:
            - generic [ref=f9e355]: "03"
            - generic [ref=f9e356]: Cost engine
            - generic [ref=f9e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f9e358]: BTS 2023
          - generic [ref=f9e360]:
            - generic [ref=f9e361]: "04"
            - generic [ref=f9e362]: Crew legality
            - generic [ref=f9e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f9e364]: Part 117
          - generic [ref=f9e366]:
            - generic [ref=f9e367]: "05"
            - generic [ref=f9e368]: Live context
            - generic [ref=f9e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f9e370]: FAA · NWS
          - generic [ref=f9e372]:
            - generic [ref=f9e373]: "06"
            - generic [ref=f9e374]: Audit trail
            - generic [ref=f9e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f9e376]: replayable
