      - generic [ref=f18e416]:
        - generic [ref=f18e417]:
          - generic [ref=f18e418]:
            - generic [ref=f18e419]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f18e420]:
              - text: Deterministic.
              - emphasis [ref=f18e421]: Auditable.
              - text: Open.
          - paragraph [ref=f18e423]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f18e424]:
          - generic [ref=f18e426]:
            - generic [ref=f18e427]: "01"
            - generic [ref=f18e428]: Cascade model
            - generic [ref=f18e429]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f18e430]: deterministic
          - generic [ref=f18e432]:
            - generic [ref=f18e433]: "02"
            - generic [ref=f18e434]: Recovery optimizer
            - generic [ref=f18e435]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f18e436]: < 10 ms
          - generic [ref=f18e438]:
            - generic [ref=f18e439]: "03"
            - generic [ref=f18e440]: Cost engine
            - generic [ref=f18e441]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f18e442]: BTS 2023
          - generic [ref=f18e444]:
            - generic [ref=f18e445]: "04"
            - generic [ref=f18e446]: Crew legality
            - generic [ref=f18e447]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f18e448]: Part 117
          - generic [ref=f18e450]:
            - generic [ref=f18e451]: "05"
            - generic [ref=f18e452]: Live context
            - generic [ref=f18e453]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f18e454]: FAA · NWS
          - generic [ref=f18e456]:
            - generic [ref=f18e457]: "06"
            - generic [ref=f18e458]: Audit trail
            - generic [ref=f18e459]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f18e460]: replayable
