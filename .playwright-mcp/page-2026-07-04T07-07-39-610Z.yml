          - paragraph [ref=f1e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f1e340]:
          - generic [ref=f1e342]:
            - generic [ref=f1e343]: "01"
            - generic [ref=f1e344]: Cascade model
            - generic [ref=f1e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f1e346]: deterministic
          - generic [ref=f1e348]:
            - generic [ref=f1e349]: "02"
            - generic [ref=f1e350]: Recovery optimizer
            - generic [ref=f1e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f1e352]: < 10 ms
          - generic [ref=f1e354]:
            - generic [ref=f1e355]: "03"
            - generic [ref=f1e356]: Cost engine
            - generic [ref=f1e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f1e358]: BTS 2023
          - generic [ref=f1e360]:
            - generic [ref=f1e361]: "04"
            - generic [ref=f1e362]: Crew legality
            - generic [ref=f1e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f1e364]: Part 117
          - generic [ref=f1e366]:
            - generic [ref=f1e367]: "05"
            - generic [ref=f1e368]: Live context
            - generic [ref=f1e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f1e370]: FAA · NWS
          - generic [ref=f1e372]:
            - generic [ref=f1e373]: "06"
            - generic [ref=f1e374]: Audit trail
            - generic [ref=f1e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f1e376]: replayable
