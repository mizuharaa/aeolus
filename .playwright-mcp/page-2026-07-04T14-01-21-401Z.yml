      - generic [ref=f19e381]:
        - generic [ref=f19e382]:
          - generic [ref=f19e383]:
            - generic [ref=f19e384]: 03 — Methodology
            - heading "Deterministic. Auditable. Open." [level=2] [ref=f19e385]:
              - text: Deterministic.
              - emphasis [ref=f19e386]: Auditable.
              - text: Open.
          - paragraph [ref=f19e388]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f19e389]:
          - generic [ref=f19e391]:
            - generic [ref=f19e392]: "01"
            - generic [ref=f19e393]: Cascade model
            - generic [ref=f19e394]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f19e395]: deterministic
          - generic [ref=f19e397]:
            - generic [ref=f19e398]: "02"
            - generic [ref=f19e399]: Recovery optimizer
            - generic [ref=f19e400]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f19e401]: < 10 ms
          - generic [ref=f19e403]:
            - generic [ref=f19e404]: "03"
            - generic [ref=f19e405]: Cost engine
            - generic [ref=f19e406]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f19e407]: BTS 2023
          - generic [ref=f19e409]:
            - generic [ref=f19e410]: "04"
            - generic [ref=f19e411]: Crew legality
            - generic [ref=f19e412]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f19e413]: Part 117
          - generic [ref=f19e415]:
            - generic [ref=f19e416]: "05"
            - generic [ref=f19e417]: Live context
            - generic [ref=f19e418]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f19e419]: FAA · NWS
          - generic [ref=f19e421]:
            - generic [ref=f19e422]: "06"
            - generic [ref=f19e423]: Audit trail
            - generic [ref=f19e424]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f19e425]: replayable
