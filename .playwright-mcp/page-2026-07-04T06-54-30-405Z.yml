        - generic [ref=f7e333]:
          - generic [ref=f7e334]:
            - generic [ref=f7e335]: 03 — Methodology
            - heading "Deterministic.Auditable. Open." [level=2] [ref=f7e483]:
              - generic [ref=f7e485]: Deterministic.
              - generic [ref=f7e487]:
                - emphasis [ref=f7e337]: Auditable.
                - text: Open.
          - paragraph [ref=f7e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f7e340]:
          - generic [ref=f7e342]:
            - generic [ref=f7e343]: "01"
            - generic [ref=f7e344]: Cascade model
            - generic [ref=f7e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f7e346]: deterministic
          - generic [ref=f7e348]:
            - generic [ref=f7e349]: "02"
            - generic [ref=f7e350]: Recovery optimizer
            - generic [ref=f7e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f7e352]: < 10 ms
          - generic [ref=f7e354]:
            - generic [ref=f7e355]: "03"
            - generic [ref=f7e356]: Cost engine
            - generic [ref=f7e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f7e358]: BTS 2023
          - generic [ref=f7e360]:
            - generic [ref=f7e361]: "04"
            - generic [ref=f7e362]: Crew legality
            - generic [ref=f7e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f7e364]: Part 117
          - generic [ref=f7e366]:
            - generic [ref=f7e367]: "05"
            - generic [ref=f7e368]: Live context
            - generic [ref=f7e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f7e370]: FAA · NWS
          - generic [ref=f7e372]:
            - generic [ref=f7e373]: "06"
            - generic [ref=f7e374]: Audit trail
            - generic [ref=f7e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f7e376]: replayable
