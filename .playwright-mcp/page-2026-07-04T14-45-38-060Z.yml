        - generic [ref=f45e423]:
          - generic [ref=f45e424]:
            - generic [ref=f45e425]:
              - generic [ref=f45e426]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f45e427]:
                - text: Deterministic.
                - emphasis [ref=f45e428]: Auditable.
                - text: Open.
            - paragraph [ref=f45e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f45e431]:
            - generic [ref=f45e433]:
              - generic [ref=f45e434]: "01"
              - generic [ref=f45e435]: Cascade model
              - generic [ref=f45e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f45e437]: deterministic
            - generic [ref=f45e439]:
              - generic [ref=f45e440]: "02"
              - generic [ref=f45e441]: Recovery optimizer
              - generic [ref=f45e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f45e443]: < 10 ms
            - generic [ref=f45e445]:
              - generic [ref=f45e446]: "03"
              - generic [ref=f45e447]: Cost engine
              - generic [ref=f45e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f45e449]: BTS 2023
            - generic [ref=f45e451]:
              - generic [ref=f45e452]: "04"
              - generic [ref=f45e453]: Crew legality
              - generic [ref=f45e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f45e455]: Part 117
            - generic [ref=f45e457]:
              - generic [ref=f45e458]: "05"
              - generic [ref=f45e459]: Live context
              - generic [ref=f45e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f45e461]: FAA · NWS
            - generic [ref=f45e463]:
              - generic [ref=f45e464]: "06"
              - generic [ref=f45e465]: Audit trail
              - generic [ref=f45e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f45e467]: replayable
