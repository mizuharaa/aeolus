            - generic [ref=f30e425]:
              - generic [ref=f30e426]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f30e427]:
                - text: Deterministic.
                - emphasis [ref=f30e428]: Auditable.
                - text: Open.
            - paragraph [ref=f30e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f30e431]:
            - generic [ref=f30e433]:
              - generic [ref=f30e434]: "01"
              - generic [ref=f30e435]: Cascade model
              - generic [ref=f30e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f30e437]: deterministic
            - generic [ref=f30e439]:
              - generic [ref=f30e440]: "02"
              - generic [ref=f30e441]: Recovery optimizer
              - generic [ref=f30e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f30e443]: < 10 ms
            - generic [ref=f30e445]:
              - generic [ref=f30e446]: "03"
              - generic [ref=f30e447]: Cost engine
              - generic [ref=f30e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f30e449]: BTS 2023
            - generic [ref=f30e451]:
              - generic [ref=f30e452]: "04"
              - generic [ref=f30e453]: Crew legality
              - generic [ref=f30e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f30e455]: Part 117
            - generic [ref=f30e457]:
              - generic [ref=f30e458]: "05"
              - generic [ref=f30e459]: Live context
              - generic [ref=f30e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f30e461]: FAA · NWS
            - generic [ref=f30e463]:
              - generic [ref=f30e464]: "06"
              - generic [ref=f30e465]: Audit trail
              - generic [ref=f30e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f30e467]: replayable
