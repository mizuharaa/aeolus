        - generic [ref=f43e423]:
          - generic [ref=f43e424]:
            - generic [ref=f43e425]:
              - generic [ref=f43e426]: 03 — Methodology
              - heading "Deterministic. Auditable. Open." [level=2] [ref=f43e427]:
                - text: Deterministic.
                - emphasis [ref=f43e428]: Auditable.
                - text: Open.
            - paragraph [ref=f43e430]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
          - generic [ref=f43e431]:
            - generic [ref=f43e433]:
              - generic [ref=f43e434]: "01"
              - generic [ref=f43e435]: Cascade model
              - generic [ref=f43e436]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
              - generic [ref=f43e437]: deterministic
            - generic [ref=f43e439]:
              - generic [ref=f43e440]: "02"
              - generic [ref=f43e441]: Recovery optimizer
              - generic [ref=f43e442]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
              - generic [ref=f43e443]: < 10 ms
            - generic [ref=f43e445]:
              - generic [ref=f43e446]: "03"
              - generic [ref=f43e447]: Cost engine
              - generic [ref=f43e448]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
              - generic [ref=f43e449]: BTS 2023
            - generic [ref=f43e451]:
              - generic [ref=f43e452]: "04"
              - generic [ref=f43e453]: Crew legality
              - generic [ref=f43e454]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
              - generic [ref=f43e455]: Part 117
            - generic [ref=f43e457]:
              - generic [ref=f43e458]: "05"
              - generic [ref=f43e459]: Live context
              - generic [ref=f43e460]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
              - generic [ref=f43e461]: FAA · NWS
            - generic [ref=f43e463]:
              - generic [ref=f43e464]: "06"
              - generic [ref=f43e465]: Audit trail
              - generic [ref=f43e466]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
              - generic [ref=f43e467]: replayable
