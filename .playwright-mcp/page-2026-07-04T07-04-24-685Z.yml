          - paragraph [ref=e339]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=e340]:
          - generic [ref=e342]:
            - generic [ref=e343]: "01"
            - generic [ref=e344]: Cascade model
            - generic [ref=e345]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=e346]: deterministic
          - generic [ref=e348]:
            - generic [ref=e349]: "02"
            - generic [ref=e350]: Recovery optimizer
            - generic [ref=e351]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=e352]: < 10 ms
          - generic [ref=e354]:
            - generic [ref=e355]: "03"
            - generic [ref=e356]: Cost engine
            - generic [ref=e357]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=e358]: BTS 2023
          - generic [ref=e360]:
            - generic [ref=e361]: "04"
            - generic [ref=e362]: Crew legality
            - generic [ref=e363]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=e364]: Part 117
          - generic [ref=e366]:
            - generic [ref=e367]: "05"
            - generic [ref=e368]: Live context
            - generic [ref=e369]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=e370]: FAA · NWS
          - generic [ref=e372]:
            - generic [ref=e373]: "06"
            - generic [ref=e374]: Audit trail
            - generic [ref=e375]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=e376]: replayable
