          - generic [ref=f11e298]:
            - generic [ref=f11e299]: 03 — Methodology
            - heading "Deterministic.Auditable. Open." [level=2] [ref=f11e449]:
              - generic [ref=f11e451]: Deterministic.
              - generic [ref=f11e453]:
                - emphasis [ref=f11e301]: Auditable.
                - text: Open.
          - paragraph [ref=f11e303]: Six systems, no black boxes. Same inputs, same cascade, same plans — every run of the simulator is reproducible end to end.
        - generic [ref=f11e304]:
          - generic [ref=f11e306]:
            - generic [ref=f11e307]: "01"
            - generic [ref=f11e308]: Cascade model
            - generic [ref=f11e309]: Rotation-graph propagation built from the schedule itself — buffer-aware, no ML, no training data. Every forecast is reproducible from its inputs.
            - generic [ref=f11e310]: deterministic
          - generic [ref=f11e312]:
            - generic [ref=f11e313]: "02"
            - generic [ref=f11e314]: Recovery optimizer
            - generic [ref=f11e315]: OR-Tools CP-SAT over swaps, delays, cancellations and reroutes; four weighted objectives produce four differentiated plans.
            - generic [ref=f11e316]: < 10 ms
          - generic [ref=f11e318]:
            - generic [ref=f11e319]: "03"
            - generic [ref=f11e320]: Cost engine
            - generic [ref=f11e321]: DOT BTS 2023 delay and cancellation rates, DOT compensation rules, EU-ETS carbon pricing — every dollar in a plan is decomposable.
            - generic [ref=f11e322]: BTS 2023
          - generic [ref=f11e324]:
            - generic [ref=f11e325]: "04"
            - generic [ref=f11e326]: Crew legality
            - generic [ref=f11e327]: FAR Part 117 flight-duty-period tables and cumulative limits, evaluated per plan; violations surface as flags before you commit.
            - generic [ref=f11e328]: Part 117
          - generic [ref=f11e330]:
            - generic [ref=f11e331]: "05"
            - generic [ref=f11e332]: Live context
            - generic [ref=f11e333]: FAA NAS status and NWS weather alerts stream in beside the synthetic network, so scenarios sit against real airspace conditions.
            - generic [ref=f11e334]: FAA · NWS
          - generic [ref=f11e336]:
            - generic [ref=f11e337]: "06"
            - generic [ref=f11e338]: Audit trail
            - generic [ref=f11e339]: Every trigger, solve and commit is logged with its inputs and objective weights; any recovery plan can be replayed step by step.
            - generic [ref=f11e340]: replayable
